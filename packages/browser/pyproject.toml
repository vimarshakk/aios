[project]
name = "aios-browser"
version = "0.3.0"
description = "AIOS Browser Runtime — lightweight fetcher and Playwright-based automation for web interaction"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-telemetry",
    "httpx>=0.28",
    "playwright>=1.49",
    "selectolax>=0.3.21",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
