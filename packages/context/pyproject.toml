[project]
name = "aios-context"
version = "0.3.0"
description = "AIOS Context Engine — builds rich context for every agent invocation"
requires-python = ">=3.11"
dependencies = [
    "aios-agents",
    "aios-memory",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]

[tool.hatch.build.targets.sdist]
include = ["src"]
