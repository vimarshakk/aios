[project]
name = "aios-distributed"
version = "0.3.0"
description = "AIOS Distributed Execution — Redis-backed task queue, workers, retry, DLQ, persistence, locking, scaling"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-telemetry",
    "redis>=5.2",
    "pydantic>=2.10",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
