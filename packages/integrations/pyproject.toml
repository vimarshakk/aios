[project]
name = "aios-integrations"
version = "0.3.0"
description = "AIOS Integrations Platform — third-party service integration framework with registry, auth, and lifecycle management"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "httpx>=0.28",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
