[project]
name = "aios-mcp"
version = "0.1.0"
description = "AIOS MCP client/registry — Model Context Protocol as a transport layer (ADR-0019)"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-agents",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
