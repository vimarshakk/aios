[project]
name = "aios-memory"
version = "0.3.0"
description = "AIOS Memory — FactStore, VectorMemory, and semantic retrieval"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-agents",
    "qdrant-client>=1.9.0",
    "sentence-transformers>=3.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
