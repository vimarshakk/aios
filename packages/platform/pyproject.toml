[project]
name = "aios-platform"
version = "0.1.0"
description = "AIOS Developer Platform runtime — composes M4 capabilities, skills, policy, connectors, secrets, workspaces, MCP"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-agents",
    "aios-skills",
    "aios-security",
    "aios-integrations",
    "aios-mcp",
    "aios-secrets",
    "aios-workspaces",
    "aios-artifacts",
    "aios-prompts",
    "aios-orchestrator",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
