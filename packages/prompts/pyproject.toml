[project]
name = "aios-prompts"
version = "0.1.0"
description = "AIOS Prompts — composable, reusable prompt templates"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
