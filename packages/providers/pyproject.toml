[project]
name = "aios-providers"
version = "0.3.0"
description = "AIOS Providers — Inference engine adapters for Ollama, OpenAI, Anthropic, and more"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-agents",
    "httpx>=0.27",
    "openai>=1.60",
    "anthropic>=0.40",
    "ollama>=0.4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
