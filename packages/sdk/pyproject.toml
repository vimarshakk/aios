[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aios-sdk"
version = "0.3.0"
description = "AIOS CLI and Python SDK"
requires-python = ">=3.12"
dependencies = [
    "aios-core",
    "aios-agents",
    "aios-plugins",
    "typer>=0.12",
    "rich>=13.0",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]

[project.scripts]
aios = "aios.sdk.cli:app"
