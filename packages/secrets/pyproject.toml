[project]
name = "aios-secrets"
version = "0.1.0"
description = "AIOS Secrets — encrypted, backend-agnostic secret storage"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-security",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
