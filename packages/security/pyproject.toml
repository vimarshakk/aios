[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aios-security"
version = "0.3.0"
description = "AIOS Security — Rate limiting, audit logging, encryption, and input validation."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
