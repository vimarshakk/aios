[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aios-telemetry"
version = "0.3.0"
description = "AIOS Telemetry — OpenTelemetry tracing, metrics, structured logging, and health diagnostics."
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "opentelemetry-api>=1.29",
    "opentelemetry-sdk>=1.29",
    "structlog>=24.4",
    "pydantic>=2.10",
]

[project.optional-dependencies]
otlp = [
    "opentelemetry-exporter-otlp>=1.29",
]
dev = ["pytest>=8.3", "pytest-asyncio>=0.24"]

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
