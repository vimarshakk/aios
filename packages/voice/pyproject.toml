[project]
name = "aios-voice"
version = "0.3.0"
description = "AIOS Voice — LiveKit + Kokoro TTS + Faster-Whisper STT + Silero VAD"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-agents",
    "numpy>=1.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
