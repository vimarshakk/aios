[project]
name = "aios-workflows"
version = "0.3.0"
description = "AIOS Workflows — State machines, planners, executors, and parallel execution"
requires-python = ">=3.11,<3.14"
license = "Apache-2.0"
dependencies = [
    "aios-core",
    "aios-agents",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aios"]
